<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Imagen encima de un div</title>
  <style>
    .contenedor {
      width: 300px;
      height: 200px;
      background: lightblue;
      position: relative; /* importante para que el hijo se posicione respecto a este */
    }

    .imagen {
      width: 150px;
      display: none; /* oculta al inicio */
      position: absolute; /* para poder ponerla encima */
      top: 20px; /* posición vertical */
      left: 50px; /* posición horizontal */
      z-index: 10; /* mayor que el div */
    }

    .boton {
      margin-top: 220px;
    }
  </style>
</head>
<body>

  <div class="contenedor" id="caja">
    <p>Contenido del div</p>
    <img src="https://via.placeholder.com/150" alt="ejemplo" class="imagen" id="miImagen">
  </div>

  <button class="boton" onclick="mostrarImagen()">Mostrar Imagen</button>

  <script>
    function mostrarImagen() {
      let img = document.getElementById("miImagen");
      if (img.style.display === "none") {
        img.style.display = "block";
      } else {
        img.style.display = "none";
      }
    }
  </script>

</body>
</html>
